services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - focusnook-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FOCUSNOOK_DATABASE_URL: ${FOCUSNOOK_DATABASE_URL}
      FOCUSNOOK_BIND_ADDR: 0.0.0.0:8080
      FOCUSNOOK_PUBLIC_BASE_URL: ${FOCUSNOOK_PUBLIC_BASE_URL}
      FOCUSNOOK_ADMIN_TOKEN: ${FOCUSNOOK_ADMIN_TOKEN}
      FOCUSNOOK_WEB_SECONDARY_PASSWORD: ${FOCUSNOOK_WEB_SECONDARY_PASSWORD}
      FOCUSNOOK_TOKEN_PEPPER_B64: ${FOCUSNOOK_TOKEN_PEPPER_B64}
      FOCUSNOOK_ENCRYPTION_KEY_B64: ${FOCUSNOOK_ENCRYPTION_KEY_B64}
      FOCUSNOOK_LEGAL_NAME: ${FOCUSNOOK_LEGAL_NAME:-}
      FOCUSNOOK_LEGAL_TAX_ID: ${FOCUSNOOK_LEGAL_TAX_ID:-}
      FOCUSNOOK_LEGAL_ADDRESS: ${FOCUSNOOK_LEGAL_ADDRESS:-}
      FOCUSNOOK_SUPPORT_EMAIL: ${FOCUSNOOK_SUPPORT_EMAIL:-}
      FOCUSNOOK_MAX_OPS_PER_EXCHANGE: ${FOCUSNOOK_MAX_OPS_PER_EXCHANGE:-500}
      FOCUSNOOK_MAX_OPERATION_PAYLOAD_BYTES: ${FOCUSNOOK_MAX_OPERATION_PAYLOAD_BYTES:-262144}
      FOCUSNOOK_MAX_BLOB_BYTES: ${FOCUSNOOK_MAX_BLOB_BYTES:-15728640}
      RUST_LOG: ${RUST_LOG:-focusnook_sync_server=info,tower_http=info}
    ports:
      - "127.0.0.1:${FOCUSNOOK_HOST_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD", "/usr/local/bin/focusnook-sync-server", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  focusnook-postgres:
