<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FocusNook</title>
  <desc id="desc">A calm product banner for FocusNook, an always-on-top daily planning overlay.</desc>
  <defs>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1010 92) rotate(138) scale(510 420)">
      <stop stop-color="#7C8FFF" stop-opacity="0.44"/>
      <stop offset="0.45" stop-color="#43D4B7" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#11121A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(200 360) rotate(-22) scale(520 300)">
